<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title id="doc-title">ACES 入学评估问卷</title>
    <link rel="stylesheet" href="fonts.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#app-main" data-i18n="a11y.skip">跳到主要内容</a>

    <header class="topbar" role="banner">
      <div class="topbar__inner">
        <div class="brand">
          <p class="brand__eyebrow">ACES</p>
          <h1 class="brand__title" data-i18n="brand.title">自适应认知评估系统</h1>
        </div>

        <div class="lang-switch" role="group" id="lang-switch" aria-label="Language Switch">
          <button class="lang-btn" type="button" data-lang="zh" id="lang-zh">中文</button>
          <button class="lang-btn" type="button" data-lang="en" id="lang-en">English</button>
        </div>
      </div>
    </header>

    <main class="layout" id="app-main">
      <section class="hero card" aria-labelledby="hero-title">
        <p class="hero__eyebrow" data-i18n="hero.eyebrow">教学分层支持原型</p>
        <h2 id="hero-title" class="hero__title" data-i18n="hero.title">入学评估问卷</h2>
        <p class="hero__subtitle" data-i18n="hero.subtitle">
          教师观察填写，用于教学分组建议，不用于医学诊断。
        </p>
      </section>

      <section class="card" id="step-meta" data-step="meta" aria-labelledby="meta-heading">
        <h2 id="meta-heading" data-i18n="meta.heading">基本信息</h2>
        <p class="section-lead" data-i18n="meta.lead">
          请先填写基本信息，再进入问卷模块。
        </p>

        <form id="meta-form" novalidate>
          <div class="field-grid">
            <div class="md-field">
              <label for="student-id" data-i18n="meta.studentId">学生编号</label>
              <input id="student-id" name="studentId" type="text" maxlength="40" required />
            </div>
            <div class="md-field">
              <label for="teacher-name" data-i18n="meta.teacherName">教师姓名</label>
              <input id="teacher-name" name="teacherName" type="text" maxlength="40" required />
            </div>
            <div class="md-field">
              <label for="assessment-date" data-i18n="meta.assessmentDate">评估日期</label>
              <input id="assessment-date" name="assessmentDate" type="date" required />
            </div>
          </div>

          <p class="hint" data-i18n="meta.hint">必填字段不能为空。</p>
          <p class="error" id="meta-error" role="alert" hidden></p>

          <div class="actions">
            <button class="btn btn--filled" type="submit" id="start-questionnaire" data-i18n="buttons.start">
              开始问卷
            </button>
          </div>
        </form>
      </section>

      <section
        class="card"
        id="step-questionnaire"
        data-step="questionnaire"
        aria-labelledby="questionnaire-heading"
        hidden
      >
        <div class="questionnaire-top">
          <h2 id="questionnaire-heading" data-i18n="questionnaire.heading">评估问卷</h2>
          <div class="progress-wrap">
            <label for="progress-bar" id="progress-label" data-i18n="questionnaire.progressLabel">完成进度</label>
            <progress id="progress-bar" max="16" value="0">0/16</progress>
            <span id="progress-text">0 / 16</span>
          </div>
        </div>

        <div class="question-nav-panel">
          <div class="question-nav-header">
            <p class="question-counter" id="question-counter">第 1 / 17 题</p>
            <p class="question-nav-hint" data-i18n="questionnaire.jumpHint">点击题号可跳转到对应问题。</p>
          </div>
          <div
            class="question-jump-list"
            id="question-jump-list"
            role="group"
            aria-labelledby="questionnaire-heading"
          ></div>
        </div>

        <div class="error-summary" id="config-error" role="alert" hidden></div>
        <div class="error-summary" id="questionnaire-error" role="alert" hidden></div>

        <form id="questionnaire-form" novalidate aria-describedby="progress-label"></form>

        <div class="actions">
          <button class="btn btn--outlined" type="button" id="back-meta" data-i18n="buttons.backToInfo">
            返回信息页
          </button>
          <button class="btn btn--tonal" type="button" id="save-draft" data-i18n="buttons.saveDraft">
            保存草稿
          </button>
          <button class="btn btn--outlined" type="button" id="previous-question" data-i18n="buttons.previousQuestion">
            上一题
          </button>
          <button class="btn btn--filled" type="button" id="next-question" data-i18n="buttons.nextQuestion">
            下一题
          </button>
          <button class="btn btn--filled" type="button" id="generate-result" data-i18n="buttons.generateResult">
            提交问卷
          </button>
        </div>
      </section>

      <section class="card" id="step-result" data-step="result" aria-labelledby="result-heading" hidden>
        <h2 id="result-heading" data-i18n="result.heading">评估结果</h2>
        <div class="result-box" id="result-box" aria-live="polite"></div>

        <h3 data-i18n="result.moduleScores">模块得分</h3>
        <div id="module-bars" class="bars"></div>

        <h3 data-i18n="result.trackScores">分轨拟合分</h3>
        <div id="track-bars" class="bars"></div>

        <h3 data-i18n="result.recommendations">建议</h3>
        <ul id="recommendation-list" class="recommendation-list"></ul>

        <div class="actions">
          <button class="btn btn--outlined" type="button" id="edit-answers" data-i18n="buttons.editAnswers">
            修改答案
          </button>
          <button class="btn btn--filled" type="button" id="save-record" data-i18n="buttons.saveRecord">
            保存记录
          </button>
          <button class="btn btn--tonal" type="button" id="export-record" data-i18n="buttons.exportJson">
            导出 JSON
          </button>
        </div>
      </section>

      <section class="card" id="history" aria-labelledby="history-heading">
        <h2 id="history-heading" data-i18n="history.heading">本机历史记录</h2>
        <p class="section-lead" data-i18n="history.lead">
          记录仅保存在当前浏览器中，可用于试运行复盘。
        </p>
        <ul id="history-list" class="history-list" aria-live="polite"></ul>
      </section>
    </main>

    <footer class="footer" data-i18n="footer.text">
      ACES Prototype · Session Use Only · 非医疗用途
    </footer>

    <script src="app.js"></script>
  </body>
</html>
