<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACES — 选择版本 / Select Version</title>
  <style>
    :root {
      --md-sys-color-primary: #1a5fb4;
      --md-sys-color-on-primary: #ffffff;
      --md-sys-color-primary-container: #d8e3ff;
      --md-sys-color-on-primary-container: #001a41;
      --md-sys-color-secondary: #445f8c;
      --md-sys-color-secondary-container: #dbe2f9;
      --md-sys-color-surface: #f8f9ff;
      --md-sys-color-surface-container: #eef2ff;
      --md-sys-color-outline: #75829d;
      --md-sys-color-outline-variant: #c3c9d8;
      --md-sys-color-on-surface: #172033;
      --md-sys-color-on-surface-variant: #43506b;
      --md-ref-radius-sm: 12px;
      --md-ref-radius-md: 16px;
      --md-ref-radius-lg: 24px;
      --md-elevation-1: 0 1px 2px rgba(12, 34, 72, 0.1), 0 2px 8px rgba(12, 34, 72, 0.08);
      --md-elevation-2: 0 8px 24px rgba(19, 42, 82, 0.12);
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      color: var(--md-sys-color-on-surface);
      font-family: "Manrope", "Noto Sans SC", -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.5;
      background:
        radial-gradient(circle at 10% -15%, #d8e7ff 0, transparent 40%),
        radial-gradient(circle at 95% 5%, #ccf1ff 0, transparent 34%),
        linear-gradient(180deg, #f7f9ff 0%, #f2f5fc 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--md-sys-color-primary);
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 1.125rem;
      color: var(--md-sys-color-on-surface-variant);
      margin: 0;
    }

    .lang-toggle {
      position: absolute;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.25rem;
      background: var(--md-sys-color-surface-container);
      border-radius: var(--md-ref-radius-lg);
      padding: 0.2rem;
    }

    .lang-btn {
      border: none;
      background: transparent;
      color: var(--md-sys-color-on-surface-variant);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.4rem 0.75rem;
      border-radius: var(--md-ref-radius-sm);
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .lang-btn.is-active {
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      max-width: 720px;
      width: 100%;
    }

    .card {
      background: var(--md-sys-color-surface);
      border: 1px solid var(--md-sys-color-outline-variant);
      border-radius: var(--md-ref-radius-md);
      box-shadow: var(--md-elevation-1);
      padding: 2rem 1.5rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      transition: box-shadow 0.2s, transform 0.15s;
    }

    .card:hover {
      box-shadow: var(--md-elevation-2);
      transform: translateY(-2px);
    }

    .card__version {
      font-size: 2rem;
      font-weight: 700;
      color: var(--md-sys-color-primary);
      margin: 0;
    }

    .card__desc {
      font-size: 0.9375rem;
      color: var(--md-sys-color-on-surface-variant);
      margin: 0;
      line-height: 1.6;
    }

    .card__btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: 100px;
      background: var(--md-sys-color-primary);
      color: var(--md-sys-color-on-primary);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }

    .card__btn:hover {
      opacity: 0.9;
    }

    .card__btn:active {
      opacity: 0.8;
    }

    .card__tag {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.6rem;
      border-radius: 100px;
      background: var(--md-sys-color-primary-container);
      color: var(--md-sys-color-on-primary-container);
    }

    footer {
      margin-top: 3rem;
      text-align: center;
      font-size: 0.8125rem;
      color: var(--md-sys-color-outline);
    }
  </style>
</head>
<body>
  <div class="lang-toggle" role="group" aria-label="Language">
    <button class="lang-btn is-active" data-lang="zh" aria-pressed="true">中文</button>
    <button class="lang-btn" data-lang="en" aria-pressed="false">EN</button>
  </div>

  <header>
    <h1>ACES</h1>
    <p class="subtitle" data-i18n="subtitle">适应性认知评估系统 / Adaptive Cognitive Evaluation System</p>
  </header>

  <div class="cards">
    <div class="card">
      <h2 class="card__version">V1</h2>
      <span class="card__tag" data-i18n="v1Tag">原版</span>
      <p class="card__desc" data-i18n="v1Desc">原始评估版本 — 模块化评分系统与职业方向推荐</p>
      <a class="card__btn" href="./v1/" data-i18n="v1Btn">进入 V1 →</a>
    </div>
    <div class="card">
      <h2 class="card__version">V2</h2>
      <span class="card__tag" data-i18n="v2Tag">更新版</span>
      <p class="card__desc" data-i18n="v2Desc">重构评估版本 — 三级支持等级评分与教师评估量表</p>
      <a class="card__btn" href="./v2/" data-i18n="v2Btn">进入 V2 →</a>
    </div>
  </div>

  <footer>
    <p data-i18n="footer">UCMP6030 课程项目 · 特殊教育方案设计</p>
  </footer>

  <script>
    const TEXT = {
      subtitle: {
        zh: "适应性认知评估系统",
        en: "Adaptive Cognitive Evaluation System"
      },
      v1Tag: { zh: "原版", en: "Original" },
      v1Desc: {
        zh: "原始评估版本 — 模块化评分系统与职业方向推荐",
        en: "Original assessment — Module-based scoring with career track recommendations"
      },
      v1Btn: { zh: "进入 V1 →", en: "Open V1 →" },
      v2Tag: { zh: "更新版", en: "Updated" },
      v2Desc: {
        zh: "重构评估版本 — 三级支持等级评分与教师评估量表",
        en: "Refactored assessment — 3-level support scoring with teacher rating scales"
      },
      v2Btn: { zh: "进入 V2 →", en: "Open V2 →" },
      footer: {
        zh: "UCMP6030 课程项目 · 特殊教育方案设计",
        en: "UCMP6030 Course Project · Special Education Program Design"
      }
    };

    let lang = localStorage.getItem("aces_language") || "zh";

    function applyLang() {
      document.querySelectorAll("[data-i18n]").forEach(function (el) {
        const key = el.getAttribute("data-i18n");
        if (TEXT[key]) {
          el.textContent = TEXT[key][lang] || TEXT[key].zh;
        }
      });
      document.querySelectorAll(".lang-btn").forEach(function (btn) {
        const isActive = btn.getAttribute("data-lang") === lang;
        btn.classList.toggle("is-active", isActive);
        btn.setAttribute("aria-pressed", String(isActive));
      });
      document.documentElement.lang = lang;
    }

    document.querySelectorAll(".lang-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        lang = btn.getAttribute("data-lang");
        localStorage.setItem("aces_language", lang);
        applyLang();
      });
    });

    applyLang();
  </script>
</body>
</html>
